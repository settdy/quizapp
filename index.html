<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Typing Quiz</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/topbar.css" />
    <link rel="stylesheet" href="css/timer.css" />
    <link rel="stylesheet" href="css/play.css" />
    <link rel="stylesheet" href="css/grid.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <div class="sticky-bar">
      <header>
        <h1>🤖 Typing Quiz</h1>
        <div class="top-controls">
          <select id="q"></select>
          <input
            id="i"
            autocomplete="off"
            spellcheck="false"
            placeholder="Type answer …"
            disabled
          />
          <button id="startBtn" type="button">▶ Start Quiz</button>
          <button id="giveUpBtn" type="button" disabled>🏳️ Give Up</button>
        </div>
      </header>

      <div class="meta">
        <div class="meta-left">
          <span class="label"></span>
          <span class="count" id="p"><strong>0</strong> / 0</span>
        </div>
        <div class="meta-center" id="feedback"></div>
        <div class="meta-right">
          <span class="label"></span>
          <span id="timerDisplay">⏱ 00:00</span>
        </div>
      </div>
      <div class="progress-track"><div class="bar" id="progressBar"></div></div>
    </div>
    <div id="cols"></div>

    <script src="scripts/match.js"></script>
    <script src="scripts/timer.js"></script>
    <script src="scripts/counter.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
